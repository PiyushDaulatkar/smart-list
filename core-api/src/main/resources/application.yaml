spring:
  application:
    name: core-api

  # INSIGHT: datasource: The object that manages database connections for your application.
  datasource:
    url: jdbc:postgresql://172.17.0.2:5432/{DB}
    username: { DB_USER }
    password: { DB_PASSWORD }

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
